# CalCOFI uptime monitor & status page — https://status.calcofi.io
# Configuration reference: https://upptime.js.org/docs/configuration
#
# To disable a check: comment out (#) its `- name:` block below.
# `maxResponseTime` (ms) sets the "degraded" (slow-but-up) threshold; Shiny apps
# cold-start in ~11-16s, so 30000 keeps them green while flagging genuinely stuck loads.

owner: CalCOFI
repo: uptime

sites:
  # --- production Shiny apps (https://app.calcofi.io/<app>/) ---
  - name: Oceano app
    url: https://app.calcofi.io/oceano/
    maxResponseTime: 30000
  - name: CTD app
    url: https://app.calcofi.io/ctd/
    maxResponseTime: 30000
  - name: Datacheck app
    url: https://app.calcofi.io/datacheck/
    maxResponseTime: 30000
  - name: Dashboard app
    url: https://app.calcofi.io/dashboard/
    maxResponseTime: 30000
  - name: Copernicus app
    url: https://app.calcofi.io/copernicus/
    maxResponseTime: 30000
  - name: Integrated app
    url: https://app.calcofi.io/int/
    maxResponseTime: 30000
  - name: MarMam app
    url: https://app.calcofi.io/marmam/
    maxResponseTime: 30000
  - name: Pollutants app
    url: https://app.calcofi.io/pollutants/
    maxResponseTime: 30000
  - name: SaferSeafood app
    url: https://app.calcofi.io/SaferSeafood/
    maxResponseTime: 30000
  - name: Capstone app
    url: https://app.calcofi.io/capstone/
    maxResponseTime: 30000

  # --- dev apps (comment out any line to disable) ---
  #- name: Oceano (dev)
  #  url: https://app.calcofi.io/oceano-dev/
  #  maxResponseTime: 30000
  #- name: Casts
  #  url: https://app.calcofi.io/casts/
  #  maxResponseTime: 30000
  #- name: Hex Density
  #  url: https://app.calcofi.io/hex/
  #  maxResponseTime: 30000
  #- name: Taxa (dev)
  #  url: https://app.calcofi.io/taxa-dev/
  #  maxResponseTime: 30000
  #- name: up2db
  #  url: https://app.calcofi.io/up2db/
  #  maxResponseTime: 30000

  # --- supporting infrastructure ---
  - name: Shiny server
    url: https://app.calcofi.io/
  - name: Tile server
    url: https://tile.calcofi.io/index.json
  - name: File server
    url: https://file.calcofi.io/
  - name: Home website
    url: https://calcofi.io/

status-website:
  cname: status.calcofi.io
  name: CalCOFI Status
  introTitle: "CalCOFI Status"
  introMessage: "Live status of CalCOFI apps and services. Powered by [Upptime](https://upptime.js.org)."
  theme: dark
  logoUrl: https://calcofi.io/schema/assets/logo_calcofi.svg
  favicon: https://calcofi.io/schema/assets/favicon-32x32.png
  navbar:
    - title: Home
      href: https://calcofi.io
    - title: Schema
      href: https://calcofi.io/schema
    - title: Query
      href: https://calcofi.io/query
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  # Match the calcofi.io schema/query dark palette (neutral charcoal + #4dabf7 accent).
  # :root:root beats the theme's :root regardless of stylesheet load order.
  # Status colors (up green / down red / degraded yellow) are left at semantic defaults.
  css: |
    :root:root {
      --body-background-color: #1b1d20;
      --body-text-color: #e6e9ed;
      --card-background-color: #24272b;
      --card-border-color: #3a3f44;
      --nav-background-color: #24272b;
      --nav-border-bottom-color: #3a3f44;
      --nav-current-border-bottom-color: #4dabf7;
      --submit-button-background-color: #4dabf7;
      --submit-button-border-color: #339af0;
      --error-button-background-color: #4dabf7;
      --error-button-border-color: #339af0;
    }

# Incident issues are auto-assigned (and emailed) to these GitHub users.
# Anyone who "Watches" CalCOFI/uptime also receives incident notifications.
assignees:
  - bbest
