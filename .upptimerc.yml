# CalCOFI uptime monitor & status page — https://status.calcofi.io
# Configuration reference: https://upptime.js.org/docs/configuration
#
# *** EXTERNAL DEPENDENCY — not obvious from this repo alone (see OPERATIONS.md) ***
# Uptime checks are triggered every 15 min by a GCP Cloud Scheduler job, NOT by GitHub's
# cron (GitHub silently drops most scheduled runs on public repos). The job
# `calcofi-uptime-dispatch` (GCP project `ucsd-sio-calcofi`, region us-central1) POSTs
# `{"event_type":"uptime"}` to this repo's dispatches API, firing the "Uptime CI"
# workflow's `repository_dispatch: [uptime]` trigger. If checks stop updating, look there.
#
# To disable a check: comment out (#) its `- name:` block below.
# `maxResponseTime` (ms) sets the "degraded" (slow-but-up) threshold; Shiny apps
# cold-start in ~11-16s, so 30000 keeps them green while flagging genuinely stuck loads.

owner: CalCOFI
repo: uptime

# GitHub's native cron is only a low-frequency fallback (it drops most scheduled runs);
# the real 15-min cadence comes from Cloud Scheduler (see note above). Keeping this daily
# also stops frequent uptime runs from starving the daily graph/summary workflows.
workflowSchedule:
  uptime: "0 12 * * *" # daily fallback only — Cloud Scheduler drives the real cadence

sites:
  # --- production Shiny apps (https://app.calcofi.io/<app>/) ---
  - name: Oceano app
    url: https://app.calcofi.io/oceano/
    maxResponseTime: 30000
  - name: CTD app
    url: https://app.calcofi.io/ctd/
    maxResponseTime: 30000
  - name: Datacheck app
    url: https://app.calcofi.io/datacheck/
    maxResponseTime: 30000
  - name: Dashboard app
    url: https://app.calcofi.io/dashboard/
    maxResponseTime: 30000
  - name: Copernicus app
    url: https://app.calcofi.io/copernicus/
    maxResponseTime: 30000
  - name: Integrated app
    url: https://app.calcofi.io/int/
    maxResponseTime: 30000
  - name: MarMam app
    url: https://app.calcofi.io/marmam/
    maxResponseTime: 30000
  - name: Pollutants app
    url: https://app.calcofi.io/pollutants/
    maxResponseTime: 30000
  - name: SaferSeafood app
    url: https://app.calcofi.io/SaferSeafood/
    maxResponseTime: 30000
  - name: Capstone app
    url: https://app.calcofi.io/capstone/
    maxResponseTime: 30000

  # --- dev apps (comment out any line to disable) ---
  #- name: Oceano (dev)
  #  url: https://app.calcofi.io/oceano-dev/
  #  maxResponseTime: 30000
  #- name: Casts
  #  url: https://app.calcofi.io/casts/
  #  maxResponseTime: 30000
  #- name: Hex Density
  #  url: https://app.calcofi.io/hex/
  #  maxResponseTime: 30000
  #- name: Taxa (dev)
  #  url: https://app.calcofi.io/taxa-dev/
  #  maxResponseTime: 30000
  #- name: up2db
  #  url: https://app.calcofi.io/up2db/
  #  maxResponseTime: 30000

  # --- supporting infrastructure ---
  - name: Shiny server
    url: https://app.calcofi.io/
  - name: Tile server
    url: https://tile.calcofi.io/index.json
  - name: File server
    url: https://file.calcofi.io/
  - name: Home website
    url: https://calcofi.io/

status-website:
  cname: status.calcofi.io
  name: CalCOFI.io
  introTitle: "CalCOFI.io Status"
  introMessage: "Live status of CalCOFI.io apps and services."
  theme: dark
  logoUrl: https://calcofi.io/schema/assets/logo_calcofi.svg
  favicon: https://calcofi.io/schema/assets/favicon-32x32.png
  navbar:
    - title: Home
      href: https://calcofi.io
    - title: Schema
      href: https://calcofi.io/schema
    - title: Query
      href: https://calcofi.io/query
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  # Match the calcofi.io schema/query dark palette (neutral charcoal + #4dabf7 accent).
  # :root:root beats the theme's :root regardless of stylesheet load order.
  # Status colors (up green / down red / degraded yellow) are left at semantic defaults.
  css: |
    :root:root {
      --body-background-color: #1b1d20;
      --body-text-color: #e6e9ed;
      --card-background-color: #24272b;
      --card-border-color: #3a3f44;
      --nav-background-color: #24272b;
      --nav-border-bottom-color: #3a3f44;
      --nav-current-border-bottom-color: #4dabf7;
      --submit-button-background-color: #4dabf7;
      --submit-button-border-color: #339af0;
      --error-button-background-color: #4dabf7;
      --error-button-border-color: #339af0;
    }
    /* the checked URL, injected as plain text under each site name (see js below).
       pointer-events:none lets clicks fall through to the card's stretched history link
       (Upptime's `article.link a::after` overlay), so the card still opens /history. */
    .cc-url {
      display: block;
      margin: -0.4rem 0 0.6rem 1.7rem;
      font-size: 0.8rem;
      line-height: 1.2;
      color: var(--muted, #9aa0a6);
      word-break: break-all;
      pointer-events: none;
    }
    /* clickable URL on the per-site history page (no stretched-link conflict there) */
    .cc-url-link {
      display: inline-block;
      margin: -0.5rem 0 1rem;
      font-size: 0.9rem;
      color: #4dabf7;
      word-break: break-all;
    }
    .cc-url-link:hover { text-decoration: underline; }
    /* "last checked" line — homepage (global) and per-site history page */
    .cc-checked, .cc-checked-site {
      font-size: 0.85rem;
      color: var(--muted, #9aa0a6);
    }
    .cc-checked { margin: 0 0 0.85rem; }
    .cc-checked-site { margin: -0.4rem 0 1.25rem; }

  # Injected enhancements (homepage + per-site history page), re-applied across SPA
  # re-renders via MutationObserver, all driven by the committed history files:
  #   - URL under each homepage card name (plain text so the card still opens /history)
  #   - clickable URL on the history page
  #   - response times in seconds (2 dp) instead of milliseconds
  #   - "last checked" timestamp in the viewer's timezone (homepage global + per-site)
  js: |
    (function () {
      var BASE = "https://raw.githubusercontent.com/CalCOFI/uptime/master/history/";
      var siteBy = {};   // slug -> summary object (url, time, timeDay, ...)
      var yml = {};      // slug -> { lastUpdated, code } | "pending"
      var DUR = { day: "timeDay", week: "timeWeek", month: "timeMonth", year: "timeYear", all: "time" };

      function toSeconds(ms) { return (ms / 1000).toFixed(2) + " s"; }
      function fmtTime(iso) {
        // Pacific Time (America/Los_Angeles), e.g. "2026-06-09 7:16:10am PT"
        try {
          var p = {};
          new Intl.DateTimeFormat("en-US", {
            timeZone: "America/Los_Angeles",
            year: "numeric", month: "2-digit", day: "2-digit",
            hour: "numeric", minute: "2-digit", second: "2-digit", hour12: true
          }).formatToParts(new Date(iso)).forEach(function (x) { p[x.type] = x.value; });
          return p.year + "-" + p.month + "-" + p.day + " " +
            p.hour + ":" + p.minute + ":" + p.second +
            (p.dayPeriod || "").toLowerCase() + " PT";
        } catch (e) { return iso; }
      }
      function ensureYml(slug) {
        if (yml[slug]) return;            // already fetching or fetched
        yml[slug] = "pending";
        fetch(BASE + slug + ".yml").then(function (r) { return r.text(); }).then(function (t) {
          var info = {};
          var lu = t.match(/lastUpdated:\s*(\S+)/); if (lu) info.lastUpdated = lu[1];
          var c = t.match(/(^|\n)code:\s*(\d+)/); if (c) info.code = c[2];
          yml[slug] = info;
          decorate();                     // re-run once data is in (idempotent)
        }).catch(function () { yml[slug] = {}; });
      }

      function decorate() {
        // ---------- homepage ----------
        var cards = document.querySelectorAll("section.live-status article");
        if (cards.length) {
          var sel = document.querySelector("section.live-status input[name='d']:checked");
          var field = DUR[sel ? sel.value : "week"] || "time";
          for (var i = 0; i < cards.length; i++) {
            var card = cards[i];
            var a = card.querySelector("h4 a[href*='/history/']");
            if (!a) continue;
            var m = a.getAttribute("href").match(/\/history\/([^\/?#]+)/);
            if (!m) continue;
            var site = siteBy[m[1]];
            if (!site) continue;
            // URL under the name (plain text; card still opens /history)
            var h4 = a.closest("h4");
            if (site.url && site.url.charAt(0) !== "$" && h4 && !card.querySelector(".cc-url")) {
              var sp = document.createElement("span");
              sp.className = "cc-url";
              sp.textContent = site.url.replace(/^https?:\/\//, "");
              h4.insertAdjacentElement("afterend", sp);
            }
            // response time -> seconds (response time is the last .data span)
            var ds = card.querySelectorAll(".data");
            if (ds.length >= 2) {
              var ms = typeof site[field] === "number" ? site[field] : site.time;
              var sec = toSeconds(ms);
              if (ds[ds.length - 1].textContent !== sec) ds[ds.length - 1].textContent = sec;
            }
          }
          // global "last checked" (use the last-listed site ~ end of the check run)
          var slugs = Object.keys(siteBy);
          if (slugs.length && !document.querySelector(".cc-checked")) {
            var last = slugs[slugs.length - 1];
            ensureYml(last);
            var g = yml[last];
            if (g && g !== "pending" && g.lastUpdated) {
              var ls = document.querySelector("section.live-status");
              if (ls) {
                var p = document.createElement("p");
                p.className = "cc-checked";
                p.textContent = "Last checked " + fmtTime(g.lastUpdated);
                var f = ls.parentNode.querySelector("div.f");
                ls.parentNode.insertBefore(p, f || ls);
              }
            }
          }
        }

        // ---------- per-site history page ----------
        // response time in the Summary stat list -> seconds
        var dds = document.querySelectorAll("section dl dd");
        for (var j = 0; j < dds.length; j++) {
          var mm = dds[j].textContent.match(/^(\d[\d,]*)\s*ms\b/);
          if (mm) dds[j].textContent = toSeconds(parseInt(mm[1].replace(/,/g, ""), 10));
        }
        // clickable URL under the title
        var titleLink = document.querySelector("section h1 a.no-underline[href^='http']");
        if (titleLink) {
          var h1 = titleLink.closest("h1");
          var nx = h1 && h1.nextElementSibling;
          if (h1 && !(nx && nx.classList.contains("cc-url-link"))) {
            var u = titleLink.getAttribute("href");
            var link = document.createElement("a");
            link.className = "cc-url-link";
            link.href = u; link.target = "_blank"; link.rel = "noopener";
            link.textContent = u.replace(/^https?:\/\//, "");
            h1.insertAdjacentElement("afterend", link);
          }
        }
        // "last checked" for this site, with timezone
        var hm = location.pathname.match(/\/history\/([^\/?#]+)/);
        if (hm && document.querySelector("section dl") && !document.querySelector(".cc-checked-site")) {
          var slug = hm[1];
          ensureYml(slug);
          var info = yml[slug];
          if (info && info !== "pending" && info.lastUpdated) {
            var dl = document.querySelector("section dl");
            var ps = document.createElement("p");
            ps.className = "cc-checked-site";
            ps.textContent = "Last checked " + fmtTime(info.lastUpdated) + (info.code ? "  ·  HTTP " + info.code : "");
            dl.insertAdjacentElement("afterend", ps);
          }
        }
      }

      fetch(BASE + "summary.json").then(function (r) { return r.json(); }).then(function (sites) {
        sites.forEach(function (s) { siteBy[s.slug] = s; });
        decorate();
        new MutationObserver(decorate).observe(document.body, { childList: true, subtree: true });
      }).catch(function () {});
    })();

# Incident issues are auto-assigned (and emailed) to these GitHub users.
# Anyone who "Watches" CalCOFI/uptime also receives incident notifications.
assignees:
  - bbest
